<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bed toewijzen</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="../static/css/bootstrap.min.css" rel="stylesheet" media="screen" th:href="@{/css/bootstrap.min.css}"/>
    <link href="../static/css/core.css" rel="stylesheet" media="screen" th:href="@{/css/core.css}" />
    <script src="http://code.jquery.com/jquery-latest.js"></script>
    <script src="../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
</head>
<body>
<div th:replace="fragments/header :: header">Header</div>
<div class="container">
    <div class="text-left">
        <h1>Bed toewijzen</h1>
        <p>
            <b>Patiënt:</b>
            <span th:text="${patient.voornaam}">voornaam</span>
            <span th:text="${patient.familienaam}">familienaam</span>
        </p>

        <div th:if="${vrijeBedden.isEmpty()}">
            <p>Er zijn momenteel geen vrije bedden beschikbaar.</p>
        </div>

        <form th:unless="${vrijeBedden.isEmpty()}" method="POST" th:action="@{/bedToewijzing.html}">
            <input type="hidden" name="patientId" th:value="${patient.id}"/>
            <fieldset>
                <div>
                    <label>Selecteer een bed:</label>
                    <select name="bedId">
                        <option th:each="bed : ${vrijeBedden}"
                                th:value="${bed.id}"
                                th:text="${bed.locatie} + ' (id: ' + ${bed.id} + ')'">
                            bed
                        </option>
                    </select>
                </div>
                <div><input type="submit" value="Toewijzen"/></div>
            </fieldset>
        </form>

        <br/>
        <a th:href="@{/patient.html(id=${patient.id})}">Terug naar patiënt</a>
    </div>
    <div th:replace="fragments/footer :: footer">&copy; 2013 The Static Templates</div>
</div>
</body>
</html>
