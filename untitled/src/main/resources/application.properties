# MySQL database connectie (pas db_naam, root en wachtwoord aan naar jullie eigen setup)
spring.datasource.url=jdbc:mysql://localhost:3306/slaaponderzoek_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=jouw_wachtwoord

# Hibernate configuratie (zorgt dat de tabellen automatisch worden aangemaakt)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Zorgt ervoor dat Spring de juiste SQL dialect gebruikt
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect